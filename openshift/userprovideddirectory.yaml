# WebEOS UserProvidedDirectory — serves /eos/experiment/fcc/ee/k4bench/runs
# over HTTPS at https://k4bench-data.web.cern.ch
#
# BEFORE APPLYING:
#   1. The k4bench project must exist on paas.cern.ch
#   2. Your CERN account must have write access to the EOS path below
#
# Apply with:
#   oc apply -f openshift/userprovideddirectory.yaml
#
apiVersion: webeos.cern.ch/v1alpha1
kind: UserProvidedDirectory
metadata:
  name: k4bench-data
  namespace: k4bench
spec:
  eosPath: /eos/experiment/fcc/ee/k4bench/runs
  siteUrl: k4bench-data.web.cern.ch
  # Allow public (unauthenticated) HTTP GET so the dashboard pod can fetch data
  # without needing CERN SSO inside the container.
  anonymousAccess: true
