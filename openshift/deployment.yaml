apiVersion: apps/v1
kind: Deployment
metadata:
  name: k4bench-dashboard
  namespace: k4bench
  labels:
    app: k4bench-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k4bench-dashboard
  template:
    metadata:
      labels:
        app: k4bench-dashboard
    spec:
      # OpenShift assigns a random UID at runtime; runAsNonRoot enforces that.
      securityContext:
        runAsNonRoot: true
      containers:
        - name: dashboard
          image: ghcr.io/jbeirer/k4bench-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: K4BENCH_DATA_URL
              value: "https://k4bench-data.web.cern.ch"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # /_stcore/health is served by the same interpreter that runs the
          # (single-threaded, GIL-bound) app rerun, so under a burst of reruns
          # the health response can be delayed past the 1s Kubernetes default.
          # Readiness only drops the pod from the router (self-healing) so it is
          # kept fairly tight; liveness *restarts* the pod — wiping the in-memory
          # st.cache_data and forcing a cold reload — so it is deliberately far
          # more tolerant, restarting only on a sustained (~2 min) outage.
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
