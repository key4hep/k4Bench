apiVersion: apps/v1
kind: Deployment
metadata:
  name: k4bench-dashboard
  namespace: k4bench
  labels:
    app: k4bench-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k4bench-dashboard
  template:
    metadata:
      labels:
        app: k4bench-dashboard
    spec:
      # OpenShift assigns a random UID at runtime; runAsNonRoot enforces that.
      securityContext:
        runAsNonRoot: true
      containers:
        - name: dashboard
          image: ghcr.io/jbeirer/k4bench-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: K4BENCH_DATA_URL
              value: "https://k4bench-data.web.cern.ch"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
