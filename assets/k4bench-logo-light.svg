<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="690" height="205"
     viewBox="5 0 690 205"
     role="img" aria-label="k4Bench — benchmarking for Key4hep">
<title>k4Bench</title>
<style>
.k4{font-family:Arial,Helvetica,sans-serif;font-size:120px;font-weight:700;fill:#1f2328;}
.bench{font-family:Arial,Helvetica,sans-serif;font-size:120px;font-weight:700;fill:#16b05f;}
.tag{font-family:Arial,Helvetica,sans-serif;font-size:28px;letter-spacing:2px;fill:#656d76;}
.sym{stroke:#16b05f;stroke-width:10;stroke-linecap:square;}
</style>

<text x="20" y="120" class="k4">k4</text>
<text x="165" y="120" class="bench">Bench</text>
