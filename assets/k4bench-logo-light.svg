<g transform="translate(580,105)">
  <line class="sym" x1="0" y1="0" x2="-30" y2="-50"/>
  <line class="sym" x1="0" y1="0" x2="55" y2="-85"/>
  <line class="sym" x1="0" y1="0" x2="85" y2="-18"/>
  <line class="sym" x1="0" y1="0" x2="45" y2="70"/>
  <line class="sym" x1="0" y1="0" x2="-25" y2="55"/>
</g>
</svg>
