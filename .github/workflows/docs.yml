name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'k4bench/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'k4bench/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # mkdocstrings imports k4bench at build time; setuptools-scm needs a
      # version even without git tags in a shallow checkout. Same trick as
      # dashboard/Dockerfile.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so setuptools-scm can derive the real version

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # k4bench itself is imported by mkdocstrings to render the API pages.
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        run: mkdocs gh-deploy --force --no-history
