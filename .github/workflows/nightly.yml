name: Nightly Benchmark

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC every night
  workflow_dispatch:

env:
  CONTAINER_IMAGE: ghcr.io/key4hep/key4hep-images/alma9

permissions:
  contents: read

jobs:
  # ── Discover which detectors to benchmark ──────────────────────────────────
  # Any *.yml file added to .github/benchmarks/ is automatically picked up.
  discover:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.list.outputs.configs }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: List benchmark configs
        id: list
        run: |
          configs=$(
            ls .github/benchmarks/*.yml 2>/dev/null \
              | xargs -I{} basename {} .yml \
              | python3 -c "import sys, json; print(json.dumps(sys.stdin.read().split()))"
          )
          [[ "${configs}" != "[]" ]] || { echo "ERROR: No benchmark configs found in .github/benchmarks/" >&2; exit 1; }
          echo "configs=${configs}" >> "$GITHUB_OUTPUT"
          echo "Found configs: ${configs}"

  # ── Run one benchmark job per detector ────────────────────────────────────
  benchmark:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ${{ fromJson(needs.discover.outputs.configs) }}
      fail-fast: false  # run all detectors even if one fails

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Cache DNF packages
        uses: actions/cache@v5
        with:
          path: /tmp/dnf-cache
          key: dnf-alma9-nightly-v1

      - name: Set up EOS service certificate
        run: |
          mkdir -p "$RUNNER_TEMP/eos-auth"
          echo "${{ secrets.EOS_SERVICE_CERT_BASE64 }}" | base64 -d > "$RUNNER_TEMP/eos-auth/usercert.pem"
          echo "${{ secrets.EOS_SERVICE_KEY_BASE64 }}"  | base64 -d > "$RUNNER_TEMP/eos-auth/userkey.pem"
          chmod 400 "$RUNNER_TEMP/eos-auth/userkey.pem"

      - name: Validate config name
        env:
          CONFIG_NAME: ${{ matrix.config }}
        run: |
          config="$CONFIG_NAME"
          [[ "$config" =~ ^[A-Za-z0-9_-]+$ ]] || { echo "ERROR: Invalid config name '${config}'" >&2; exit 1; }

      - name: Benchmark ${{ matrix.config }}
        env:
          CONFIG_NAME: ${{ matrix.config }}
        run: |
          mkdir -p /tmp/dnf-cache
          docker run --rm --init \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --volume /cvmfs:/cvmfs:shared \
            --volume "${{ github.workspace }}":/workspace \
            --volume "$RUNNER_TEMP/eos-auth":/tmp/eos-auth:ro \
            --volume /tmp/dnf-cache:/var/cache/dnf \
            --workdir /workspace \
            -e X509_USER_CERT=/tmp/eos-auth/usercert.pem \
            -e X509_USER_KEY=/tmp/eos-auth/userkey.pem \
            -e BENCHMARK_CONFIG="$CONFIG_NAME" \
            -e GITHUB_RUN_ID="${{ github.run_id }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_SERVER_URL="${{ github.server_url }}" \
            "${{ env.CONTAINER_IMAGE }}" \
            bash /workspace/.github/scripts/nightly_benchmark.sh

      - name: Clean up EOS certificate
        if: always()
        run: rm -rf "$RUNNER_TEMP/eos-auth"
