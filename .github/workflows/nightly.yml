name: Nightly Benchmark

on:
  schedule:
    - cron: '0 0 * * *'  # 01:00 CET (00:00 UTC) every night
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Discover detectors and their samples from .github/benchmarks/*.yml ─────
  # All YAML parsing and validation happens here; the output groups samples
  # under their detector so the matrix below fans out one reusable-workflow
  # call per detector (nests samples beneath it in the Actions UI).
  discover:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.list.outputs.configs }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: List benchmark configs
        id: list
        run: |
          pip3 install --quiet 'pyyaml>=6.0,<6.1'
          echo "configs=$(python3 .github/scripts/list_benchmarks.py --grouped)" >> "$GITHUB_OUTPUT"

  # ── One reusable-workflow call per detector ───────────────────────────────
  benchmark:
    needs: discover
    name: ${{ matrix.group.detector }}
    strategy:
      matrix:
        group: ${{ fromJson(needs.discover.outputs.configs) }}
      fail-fast: false
    uses: ./.github/workflows/benchmark-detector.yml
    with:
      detector:     ${{ matrix.group.detector }}
      samples_json: ${{ toJson(matrix.group.samples) }}
    secrets: inherit
