name: Deploy Dashboard

on:
  # Run automatically after a successful nightly benchmark
  workflow_run:
    workflows: ["Nightly Benchmark"]
    types: [completed]
    branches: [main]
  # Redeploy immediately when dashboard or deployment config changes
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'openshift/**'
      - '.github/workflows/deploy-dashboard.yml'
  # Allow manual redeploy at any time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: [self-hosted, fcc-ironic]
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io
    outputs:
      sha-tag: ${{ steps.build.outputs.sha-tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_base="ghcr.io/${{ github.repository_owner }}/k4bench-dashboard"
          sha_tag="${image_base}:${short_sha}"

          docker build \
            -t "${sha_tag}" \
            -f dashboard/Dockerfile \
            .

          docker push "${sha_tag}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker tag "${sha_tag}" "${image_base}:latest"
            docker push "${image_base}:latest"
          fi

          echo "sha-tag=${sha_tag}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to CERN PaaS
    needs: build-and-push
    runs-on: [self-hosted, fcc-ironic]
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v2
        with:
          oc: latest

      - name: Test API connectivity
        run: curl -vk https://api.paas.okd.cern.ch/version

      - name: Log in to CERN OpenShift
        env:
          OC_SERVER: ${{ secrets.OC_SERVER }}
          OC_TOKEN: ${{ secrets.OC_TOKEN }}
        run: |
          oc login \
            --token="${OC_TOKEN// /}" \
            --server="${OC_SERVER// /}" \
            --insecure-skip-tls-verify=true

      - name: Apply Deployment / Service / Route
        run: |
          oc apply -f openshift/deployment.yaml
          oc apply -f openshift/service.yaml
          oc apply -f openshift/route.yaml

      - name: Rollout new image
        run: |
          oc set image deployment/k4bench-dashboard \
            dashboard=${{ needs.build-and-push.outputs.sha-tag }} \
            -n k4bench
          oc rollout status deployment/k4bench-dashboard -n k4bench --timeout=120s

      - name: Print dashboard URL
        run: |
          echo "Dashboard: https://$(oc get route k4bench-dashboard -n k4bench -o jsonpath='{.spec.host}')"
