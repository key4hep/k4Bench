name: Deploy Dashboard

on:
  # Run automatically after a successful nightly benchmark
  workflow_run:
    workflows: ["Nightly Benchmark"]
    types: [completed]
    branches: [main]
  # Allow manual redeploy at any time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      sha-tag: ${{ steps.sha-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dd4bench-dashboard
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image SHA tag
        id: sha-tag
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "tag=ghcr.io/${{ github.repository_owner }}/dd4bench-dashboard:${short_sha}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to CERN PaaS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to CERN OpenShift
        # OC_SERVER  = https://api.paas.okd.cern.ch  (or the paas.cern.ch API endpoint)
        # OC_TOKEN   = service-account token with edit rights on the dd4bench namespace
        #              Create on paas.cern.ch: Project → Service Accounts → create token
        run: |
          oc login "${{ secrets.OC_SERVER }}" \
            --token="${{ secrets.OC_TOKEN }}" \
            --insecure-skip-tls-verify=false

      - name: Apply WebEOS UserProvidedDirectory
        run: oc apply -f openshift/userprovideddirectory.yaml

      - name: Apply Deployment / Service / Route
        run: |
          oc apply -f openshift/deployment.yaml
          oc apply -f openshift/service.yaml
          oc apply -f openshift/route.yaml

      - name: Rollout new image
        run: |
          oc set image deployment/dd4bench-dashboard \
            dashboard=${{ needs.build-and-push.outputs.sha-tag }} \
            -n dd4bench
          oc rollout status deployment/dd4bench-dashboard -n dd4bench --timeout=120s

      - name: Print dashboard URL
        run: |
          echo "Dashboard: https://$(oc get route dd4bench-dashboard -n dd4bench -o jsonpath='{.spec.host}')"
