name: Detector Benchmark

# Reusable workflow that runs every sample for one detector in parallel.
# Called from nightly.yml once per detector so the Actions UI nests sample
# jobs under their detector instead of showing one flat list.

on:
  workflow_call:
    inputs:
      detector:
        description: detector config name, e.g. "ALLEGRO_o1_v03"
        required: true
        type: string
      samples_json:
        description: JSON-encoded list of per-sample records (output of list_benchmarks.py --grouped)
        required: true
        type: string

env:
  CONTAINER_IMAGE: ghcr.io/key4hep/key4hep-images/alma9

permissions:
  contents: read

jobs:
  run:
    name: ${{ matrix.sample }}
    runs-on: [self-hosted, fcc-ironic]
    strategy:
      matrix:
        include: ${{ fromJson(inputs.samples_json) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # /cvmfs is pre-mounted on self-hosted ironic runners; only GitHub-hosted
      # runners need the installer (and the installer assumes Ubuntu).
      - name: Install CVMFS (GitHub-hosted runners only)
        if: runner.environment == 'github-hosted'
        uses: cvmfs-contrib/github-action-cvmfs@v5

      - name: Cache DNF packages
        uses: actions/cache@v5
        with:
          path: /tmp/dnf-cache
          key: dnf-alma9-nightly-v1

      - name: Warm up CVMFS repos
        # Force host-side autofs to mount the repos before docker run inherits
        # them via :shared propagation; without this the container can see EIO
        # the first time it traverses an unmounted CVMFS path.
        run: |
          ls /cvmfs/sw-nightlies.hsf.org/ > /dev/null
          ls /cvmfs/sw.hsf.org/          > /dev/null
          ls /cvmfs/grid.cern.ch/        > /dev/null

      - name: Set up EOS service certificate
        run: |
          mkdir -p "$RUNNER_TEMP/eos-auth"
          echo "${{ secrets.EOS_SERVICE_CERT_BASE64 }}" | base64 -d > "$RUNNER_TEMP/eos-auth/usercert.pem"
          echo "${{ secrets.EOS_SERVICE_KEY_BASE64 }}"  | base64 -d > "$RUNNER_TEMP/eos-auth/userkey.pem"
          chmod 400 "$RUNNER_TEMP/eos-auth/userkey.pem"

      - name: Benchmark ${{ matrix.sample }}
        env:
          BENCHMARK_CONFIG: ${{ inputs.detector }}
          BENCHMARK_SAMPLE: ${{ matrix.sample }}
          XML_PATH:         ${{ matrix.xml }}
          N_EVENTS:         ${{ matrix.n_events }}
          DDSIM_ARGS:       ${{ matrix.ddsim_args }}
          INPUT_FILES:      ${{ matrix.input_files }}
          STEERING_FILE:    ${{ matrix.steering_file }}
          SWEEP:            ${{ matrix.sweep }}
          VERBOSE:          ${{ matrix.verbose }}
          INCLUDE_ONLY:     ${{ matrix.include_only }}
          EXCLUDE_ONLY:     ${{ matrix.exclude_only }}
        run: |
          mkdir -p /tmp/dnf-cache
          docker run --rm --init \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --volume /cvmfs:/cvmfs:shared \
            --volume "${{ github.workspace }}":/workspace:Z \
            --volume "$RUNNER_TEMP/eos-auth":/tmp/eos-auth:ro,Z \
            --volume /tmp/dnf-cache:/var/cache/dnf:Z \
            --workdir /workspace \
            -e X509_USER_CERT=/tmp/eos-auth/usercert.pem \
            -e X509_USER_KEY=/tmp/eos-auth/userkey.pem \
            -e BENCHMARK_CONFIG -e BENCHMARK_SAMPLE \
            -e XML_PATH -e N_EVENTS -e DDSIM_ARGS -e INPUT_FILES -e STEERING_FILE \
            -e SWEEP -e VERBOSE -e INCLUDE_ONLY -e EXCLUDE_ONLY \
            -e GITHUB_RUN_ID="${{ github.run_id }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_SERVER_URL="${{ github.server_url }}" \
            "${{ env.CONTAINER_IMAGE }}" \
            bash /workspace/.github/scripts/nightly_benchmark.sh

      - name: Clean up EOS certificate
        if: always()
        run: rm -rf "$RUNNER_TEMP/eos-auth"
