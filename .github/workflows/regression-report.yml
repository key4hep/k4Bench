name: Regression Report

# Builds the regression report from the EOS run history, uploads report.json to
# EOS (read back by the dashboard's Regressions tab) and emails the CERN
# e-group with the report — every run, regardless of content.
#
# Two triggers:
#   • workflow_call    — invoked by the nightly workflow after the benchmarks.
#   • workflow_dispatch — run it by hand from the Actions tab (no benchmark
#     rerun; the report is rebuilt from whatever is already on EOS).

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression-report:
    runs-on: [self-hosted, fcc-ironic]
    env:
      CONTAINER_IMAGE: ghcr.io/key4hep/key4hep-images/alma9
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up EOS service certificate
        run: |
          mkdir -p "$RUNNER_TEMP/eos-auth"
          echo "${{ secrets.EOS_SERVICE_CERT_BASE64 }}" | base64 -d > "$RUNNER_TEMP/eos-auth/usercert.pem"
          echo "${{ secrets.EOS_SERVICE_KEY_BASE64 }}"  | base64 -d > "$RUNNER_TEMP/eos-auth/userkey.pem"
          chmod 400 "$RUNNER_TEMP/eos-auth/userkey.pem"

      - name: Build report, upload to EOS, notify e-group
        env:
          K4BENCH_DATA_URL:          ${{ vars.K4BENCH_DATA_URL || 'https://k4bench-data.web.cern.ch' }}
          K4BENCH_REGRESSION_EGROUP: ${{ vars.K4BENCH_REGRESSION_EGROUP }}
          K4BENCH_REGRESSION_FROM:   ${{ vars.K4BENCH_REGRESSION_FROM }}
          K4BENCH_DASHBOARD_URL:     ${{ vars.K4BENCH_DASHBOARD_URL }}
          GITHUB_RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Enables the best-effort blame sidecar's PR resolution. The built-in
          # token reads the public Key4hep repos at 1000 req/hr — a night touches
          # only tens of calls — and blame is fully isolated, so an absent or
          # throttled token degrades to diffs-only, never a failed report.
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          # Model-based ranking of the blame candidates. "OpenAI-compatible" is
          # the /chat/completions wire protocol, NOT the vendor — point the URL
          # at any endpoint that speaks it (OpenRouter, Groq, Gemini's compat
          # endpoint, a self-hosted server, …); the model is just K4BENCH_LLM_MODEL.
          # Must be *off-box* (never local inference on this benchmark runner).
          # Endpoint and model enable ranking; the key is optional for keyless
          # endpoints. The whole ranking path stays inside the isolated blame step.
          K4BENCH_LLM_URL:           ${{ vars.K4BENCH_LLM_URL }}
          K4BENCH_LLM_MODEL:         ${{ vars.K4BENCH_LLM_MODEL }}
          K4BENCH_LLM_API_KEY:       ${{ secrets.K4BENCH_LLM_API_KEY }}
          K4BENCH_LLM_MAX_TOKENS:    ${{ vars.K4BENCH_LLM_MAX_TOKENS || '16384' }}
          # Bounds the entire optional GitHub+LLM attribution stage. A timeout
          # skips blame.json but cannot affect report.json or notification.
          K4BENCH_BLAME_TIMEOUT:     ${{ vars.K4BENCH_BLAME_TIMEOUT || '15m' }}
        run: |
          docker pull "${{ env.CONTAINER_IMAGE }}"
          docker run --rm --init \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --volume /cvmfs:/cvmfs:shared \
            --volume "${{ github.workspace }}":/workspace:Z \
            --volume "$RUNNER_TEMP/eos-auth":/tmp/eos-auth:ro,Z \
            --workdir /workspace \
            -e X509_USER_CERT=/tmp/eos-auth/usercert.pem \
            -e X509_USER_KEY=/tmp/eos-auth/userkey.pem \
            -e K4BENCH_DATA_URL -e K4BENCH_REGRESSION_EGROUP \
            -e K4BENCH_REGRESSION_FROM -e K4BENCH_DASHBOARD_URL \
            -e GITHUB_RUN_URL -e GITHUB_TOKEN \
            -e K4BENCH_LLM_URL -e K4BENCH_LLM_MODEL -e K4BENCH_LLM_API_KEY \
            -e K4BENCH_LLM_MAX_TOKENS -e K4BENCH_BLAME_TIMEOUT \
            "${{ env.CONTAINER_IMAGE }}" \
            bash /workspace/.github/scripts/regression_report.sh

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-report
          path: |
            report/report.json
            report/report.md
            report/blame.json
          if-no-files-found: warn

      - name: Clean up EOS certificate
        if: always()
        run: rm -rf "$RUNNER_TEMP/eos-auth"
